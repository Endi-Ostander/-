<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Endi IA – визитка</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #1e1e1e;
      color: #f4f4f4;
    }

    header {
      background-color: #222;
      color: white;
      padding: 10px 20px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
    }

    nav {
      display: flex;
      gap: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 4px;
      transition: background-color 0.3s;
    }

    nav a:hover {
      background-color: #444;
    }

    /* Бургер */
    .burger {
      display: none;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
    }

    .burger span {
      width: 25px;
      height: 3px;
      background-color: white;
      border-radius: 2px;
    }

    /* Мобильное меню */
    #menu-toggle {
      display: none;
    }

    @media (max-width: 600px) {
      nav {
        display: none;
        flex-direction: column;
        background-color: #222;
        position: absolute;
        top: 50px;
        right: 0;
        width: 100%;
        text-align: left;
      }

      nav a {
        padding: 12px 20px;
        border-top: 1px solid #333;
      }

      #menu-toggle:checked + nav {
        display: flex;
      }

      .burger {
        display: flex;
      }
    }

    .decor-top {
      margin-top: 70px;
      width: 100%;
      overflow: hidden;
    }

    .decor-top img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.4;
      filter: contrast(110%) brightness(90%);
    }

    main {
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      main {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Endi-IA</div>

    <!-- Бургер-кнопка -->
    <label for="menu-toggle" class="burger">
      <span></span>
      <span></span>
      <span></span>
    </label>
    <input type="checkbox" id="menu-toggle" hidden />

    <!-- Меню -->
    <nav>
      <a href="#">Главная</a>
      <a href="#">О проекте</a>
      <a href="#">Контакты</a>
    </nav>
  </header>

  <div class="decor-top">
    <img src="https://avatars.mds.yandex.net/i?id=f68f72cb7274c9fdf11dbe206d3bed12_l-5398918-images-thumbs&n=13" alt="Декоративный фон Endi" />
  </div>

  <main>
    <h1>Добро пожаловать на мой сайт!</h1>
    <p>Это визитка проекта Endi IA. Здесь будет представлена информация о моём ИИ и его развитии.</p>
    <p>Фон и оформление адаптированы под тёмную тему и разные устройства.</p>
  </main>
</body>
</html>
